<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
  }
  #game {
    display: block;
    margin: 0 auto;
    background: #0a0a12;
  }
  #ui {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: #fff;
    text-align: center;
  }
  #ui.hidden { display: none; }
  .title {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #00f5ff, #ff00e5, #ffe600);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(0,245,255,.5));
    margin-bottom: 12px;
  }
  .sub {
    font-size: clamp(14px, 3vw, 20px);
    color: #9aa3b5;
    margin-bottom: 28px;
    line-height: 1.7;
  }
  .score-big {
    font-size: clamp(40px, 9vw, 80px);
    font-weight: 900;
    color: #ffe600;
    text-shadow: 0 0 24px rgba(255,230,0,.6);
    margin-bottom: 8px;
  }
  .best {
    font-size: clamp(14px, 3vw, 18px);
    color: #00f5ff;
    margin-bottom: 24px;
  }
  .btn {
    pointer-events: auto;
    cursor: pointer;
    border: 2px solid #00f5ff;
    background: rgba(0,245,255,.08);
    color: #00f5ff;
    font-size: clamp(16px, 3.5vw, 22px);
    font-weight: 700;
    padding: 14px 46px;
    border-radius: 999px;
    letter-spacing: 2px;
    transition: all .15s;
    box-shadow: 0 0 20px rgba(0,245,255,.25), inset 0 0 12px rgba(0,245,255,.1);
  }
  .btn:hover { background: rgba(0,245,255,.2); transform: scale(1.05); }
  #hud {
    position: fixed;
    top: 14px; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 28px;
    color: #fff;
    font-weight: 700;
    font-size: clamp(15px, 3vw, 20px);
    pointer-events: none;
    text-shadow: 0 0 10px rgba(0,0,0,.8);
  }
  #hud span b { color: #ffe600; }
  #hud span i { color: #ff00e5; font-style: normal; }
  #hudLives { color: #ff3355; letter-spacing: 3px; }
  #muteBtn {
    position: fixed;
    top: 10px; right: 12px;
    z-index: 10;
    background: rgba(0,245,255,.08);
    border: 1.5px solid rgba(0,245,255,.4);
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 20px;
    cursor: pointer;
    color: #fff;
  }
  .newbest {
    color: #ff00e5 !important;
    animation: pulse .6s infinite alternate;
  }
  @keyframes pulse { from { opacity: .6; } to { opacity: 1; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" style="display:none">
  <span>SCORE <b id="hudScore">0</b></span>
  <span>COMBO <i id="hudCombo">x1</i></span>
  <span id="hudLives">♥♥♥</span>
</div>
<button id="muteBtn">🔊</button>
<div id="ui">
  <div class="title">NEON DASH</div>
  <div class="sub" id="uiSub">
    화면 아무 곳이나 드래그해서 이동 (PC: ← → 또는 A/D)<br>
    ◆ 장애물을 피하고 ● 오브를 먹으면 콤보 + 진화!<br>
    먹을수록 커져서 피하기 어려워진다 ㅋㅋ<br>
    목숨은 ♥×3 — 맞으면 작아지고 처음 속도로
  </div>
  <div class="score-big" id="uiScore" style="display:none">0</div>
  <div class="best" id="uiBest"></div>
  <button class="btn" id="startBtn">START</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const ui = document.getElementById('ui');
  const uiSub = document.getElementById('uiSub');
  const uiScore = document.getElementById('uiScore');
  const uiBest = document.getElementById('uiBest');
  const startBtn = document.getElementById('startBtn');
  const hud = document.getElementById('hud');
  const hudScore = document.getElementById('hudScore');
  const hudCombo = document.getElementById('hudCombo');
  const hudLives = document.getElementById('hudLives');

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const BEST_KEY = 'neonDashBest';
  let best = +(localStorage.getItem(BEST_KEY) || 0);

  // ---- sound (Web Audio 합성음 — 파일 없이 코드로 소리 생성) ----
  let actx = null, muted = false;
  function ensureAudio() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
  }
  function tone(freq, dur, type, vol, freqEnd) {
    if (muted || !actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, actx.currentTime);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, actx.currentTime + dur);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  }
  const sfx = {
    orb(c) { tone(520 + c * 30, 0.1, 'sine', 0.22); setTimeout(() => tone(780 + c * 30, 0.15, 'sine', 0.16), 60); },
    graze() { tone(1500, 0.07, 'sine', 0.07, 2200); },
    evolve() { tone(440, 0.1, 'square', 0.15); setTimeout(() => tone(660, 0.1, 'square', 0.15), 80); setTimeout(() => tone(880, 0.18, 'square', 0.15), 160); },
    hit() { tone(220, 0.3, 'sawtooth', 0.3, 60); },
    over() { tone(330, 0.25, 'sawtooth', 0.22, 220); setTimeout(() => tone(220, 0.3, 'sawtooth', 0.2, 110), 180); setTimeout(() => tone(147, 0.5, 'sawtooth', 0.18, 55), 400); },
    start() { tone(330, 0.09, 'square', 0.13); setTimeout(() => tone(440, 0.09, 'square', 0.13), 90); setTimeout(() => tone(660, 0.14, 'square', 0.13), 180); }
  };
  // 심플 BGM: 게임 중에만 낮은 아르페지오 루프
  const bgmNotes = [110, 0, 220, 165, 110, 0, 196, 165];
  let bgmStep = 0;
  setInterval(() => {
    if (muted || !running || !actx) return;
    const n = bgmNotes[bgmStep % bgmNotes.length];
    if (n) { tone(n, 0.16, 'triangle', 0.06); tone(n * 2, 0.09, 'sine', 0.03); }
    bgmStep++;
  }, 165);

  // 어떤 입력이든 첫 사용자 제스처에서 오디오 잠금 해제 (모바일/iframe 대응)
  window.addEventListener('pointerdown', ensureAudio);
  window.addEventListener('touchstart', ensureAudio, { passive: true });
  window.addEventListener('keydown', ensureAudio);

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  // ---- game state ----
  let running = false;
  let score = 0, combo = 1, comboTimer = 0, speed = 2.0, spawnTimer = 0, orbTimer = 60, t = 0, shake = 0;
  let lives = 3, invincible = 0, orbsEaten = 0, diffT = 0;
  let wave = 1, gameT = 0, banner = null, meteorTimer = 600;
  let obstacles = [], orbs = [], particles = [], stars = [], trail = [];
  const player = { x: 0, y: 0, r: 13, vx: 0 };
  const keys = {};

  function initStars() {
    stars = [];
    for (let i = 0; i < 90; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, z: Math.random() * 0.8 + 0.2 });
    }
  }
  initStars();

  function reset() {
    score = 0; combo = 1; comboTimer = 0;
    speed = 2.0;
    spawnTimer = 0; orbTimer = 60;
    t = 0; shake = 0;
    lives = 3; invincible = 0; orbsEaten = 0; diffT = 0;
    wave = 1; gameT = 0; banner = null; meteorTimer = 600;
    obstacles = []; orbs = []; particles = []; trail = [];
    player.x = W / 2;
    player.y = H - 110;
    player.r = 13;
    player.vx = 0;
    hudLives.textContent = '♥♥♥';
  }

  // ---- 육성: 오브를 먹을수록 커지고 색이 진화한다 (커질수록 피하기 어려움) ----
  const STAGES = [
    { min: 0,  color: '#00f5ff', rgb: '0,245,255' },
    { min: 5,  color: '#ffe600', rgb: '255,230,0' },
    { min: 10, color: '#ff9500', rgb: '255,149,0' },
    { min: 15, color: '#ff4d29', rgb: '255,77,41' }
  ];
  function stage() {
    for (let i = STAGES.length - 1; i >= 0; i--) {
      if (orbsEaten >= STAGES[i].min) return STAGES[i];
    }
    return STAGES[0];
  }
  function playerRadius() {
    return 13 + Math.min(orbsEaten, 18) * 0.9;
  }

  function loseLife() {
    lives--;
    hudLives.textContent = '♥'.repeat(Math.max(lives, 0));
    if (lives <= 0) { gameOver(); return; }
    sfx.hit();
    burst(player.x, player.y, stage().color, 30);
    shake = 12;
    invincible = 130;           // 약 2초 무적 + 깜빡임
    diffT = 0;                  // 낙하 속도를 처음 속도로 되돌림
    orbsEaten = Math.max(0, orbsEaten - 5);  // 한 단계 퇴화
    combo = 1; comboTimer = 0;
    floatText(player.x, player.y - 30, '-1 ♥', '#ff3355');
  }

  // ---- input ----
  window.addEventListener('keydown', e => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
    keys[e.key.toLowerCase()] = true;
    if ((e.key === ' ' || e.key === 'Enter') && !running) start();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // 상대 드래그: 화면 아무 곳이나 터치한 채 움직이면 그 이동량만큼 공이 움직인다
  let lastTouchX = null, touchDelta = 0;
  const TOUCH_SENS = 1.5;
  window.addEventListener('touchstart', e => { lastTouchX = e.touches[0].clientX; }, { passive: true });
  window.addEventListener('touchmove', e => {
    const x = e.touches[0].clientX;
    if (lastTouchX !== null) touchDelta += (x - lastTouchX) * TOUCH_SENS;
    lastTouchX = x;
  }, { passive: true });
  window.addEventListener('touchend', () => { lastTouchX = null; });

  startBtn.addEventListener('click', start);

  function start() {
    reset();
    running = true;
    ui.classList.add('hidden');
    hud.style.display = 'flex';
    ensureAudio();
    sfx.start();
  }

  function gameOver() {
    running = false;
    sfx.over();
    burst(player.x, player.y, stage().color, 60);
    shake = 18;
    const isNew = score > best;
    if (isNew) { best = score; localStorage.setItem(BEST_KEY, best); }
    setTimeout(() => {
      uiSub.style.display = 'none';
      uiScore.style.display = 'block';
      uiScore.textContent = score.toLocaleString();
      uiBest.textContent = 'BEST ' + best.toLocaleString();
      uiBest.className = 'best' + (isNew ? ' newbest' : '');
      if (isNew) uiBest.textContent = '🏆 NEW BEST! ' + best.toLocaleString();
      startBtn.textContent = 'RETRY';
      ui.classList.remove('hidden');
      hud.style.display = 'none';
    }, 700);
  }

  // ---- entities ----
  function baseDiamond(kind, color, rgb) {
    return {
      kind, color, rgb,
      x: Math.random() * (W - 80) + 40,
      y: -50,
      size: 16 + Math.random() * 22,
      rot: Math.random() * Math.PI,
      rotSpd: (Math.random() - 0.5) * 0.12,
      vy: speed * (0.85 + Math.random() * 0.4),
      vx: (Math.random() - 0.5) * 1.2,
      grazed: false
    };
  }

  function spawnObstacle() {
    const r = Math.random();
    if (wave >= 2 && r < 0.16) {
      // 추적 다이아 (보라): 플레이어 쪽으로 서서히 방향을 튼다
      const o = baseDiamond('homing', '#c46bff', '196,107,255');
      o.vy = speed * 0.9;
      o.size = 15 + Math.random() * 12;
      obstacles.push(o);
    } else if (wave >= 3 && r < 0.32) {
      // 지그재그 다이아 (초록): 사인파로 흔들리며 낙하
      const o = baseDiamond('zig', '#54ff9f', '84,255,159');
      o.baseX = o.x;
      o.amp = 60 + Math.random() * 80;
      o.phase = Math.random() * Math.PI * 2;
      o.vy = speed * 0.8;
      obstacles.push(o);
    } else if (r < 0.65) {
      obstacles.push(baseDiamond('diamond', '#ff00e5', '255,0,229'));
    } else {
      // 가로 레이저 바 (한쪽에 틈)
      const gapX = Math.random() * (W - 180) + 90;
      const gapW = 130 + Math.random() * 70;
      obstacles.push({
        kind: 'bar', y: -30, gapX, gapW,
        vy: speed * 0.75, grazed: false
      });
    }
  }

  function spawnOrb() {
    orbs.push({
      x: Math.random() * (W - 100) + 50,
      y: -30,
      r: 9,
      vy: speed * 0.9,
      phase: Math.random() * Math.PI * 2
    });
  }

  function burst(x, y, color, n = 14) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 5 + 1.5;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, color,
        r: Math.random() * 3 + 1.5
      });
    }
  }

  function floatText(x, y, text, color) {
    particles.push({ x, y, vx: 0, vy: -1.4, life: 1, text, color });
  }

  // ---- collision helpers ----
  function hitDiamond(o) {
    const dx = player.x - o.x, dy = player.y - o.y;
    const dist = Math.hypot(dx, dy);
    return { hit: dist < o.size * 0.72 + player.r, graze: dist < o.size + player.r + 26 };
  }

  function hitBar(o) {
    const barH = 12;
    if (Math.abs(player.y - o.y) > barH / 2 + player.r) return { hit: false, graze: false };
    const inGap = player.x > o.gapX - o.gapW / 2 + player.r && player.x < o.gapX + o.gapW / 2 - player.r;
    return { hit: !inGap, graze: inGap };
  }

  function hitMeteor(o) {
    const dist = Math.hypot(player.x - o.x, player.y - o.y);
    return { hit: dist < o.r + player.r, graze: false };
  }

  // ---- update ----
  function update() {
    t++;

    // stars scroll
    for (const s of stars) {
      s.y += s.z * speed * 0.6;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }

    if (!running) return;

    // difficulty ramp (피격 시 diffT가 리셋되어 속도가 처음으로 돌아감)
    diffT++;
    gameT++;
    speed = 2.0 + diffT * 0.0022;
    score += combo;

    // 웨이브: 25초마다 국면 전환, 새 장애물 해금 (피격과 무관하게 진행)
    const newWave = 1 + Math.floor(gameT / 1500);
    if (newWave !== wave) {
      wave = newWave;
      banner = { text: 'WAVE ' + wave, timer: 120 };
      sfx.evolve();
    }
    if (banner && banner.timer > 0) banner.timer--;

    // 웨이브 3부터 메테오 샤워 이벤트
    if (wave >= 3) {
      meteorTimer--;
      if (meteorTimer <= 0) {
        const n = 3 + Math.min(wave - 2, 4);
        for (let mi = 0; mi < n; mi++) {
          obstacles.push({
            kind: 'meteor',
            x: Math.random() * (W - 60) + 30,
            y: -20, r: 7,
            warnTimer: 45 + mi * 12,
            grazed: true
          });
        }
        meteorTimer = 700 + Math.random() * 400;
        banner = { text: '☄ METEOR!', timer: 90 };
        sfx.hit();
      }
    }

    if (invincible > 0) invincible--;
    player.r = playerRadius();

    // combo decay
    if (comboTimer > 0) comboTimer--;
    else combo = 1;

    // player move
    const accel = 1.3, maxV = 11 + speed * 0.5, fric = 0.86;
    if (keys['arrowleft'] || keys['a']) player.vx -= accel;
    if (keys['arrowright'] || keys['d']) player.vx += accel;
    player.vx *= fric;
    player.vx = Math.max(-maxV, Math.min(maxV, player.vx));
    player.x += player.vx;
    if (touchDelta !== 0) {
      player.x += touchDelta;
      touchDelta = 0;
    }
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));

    trail.unshift({ x: player.x, y: player.y });
    if (trail.length > 14) trail.pop();

    // spawn
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnObstacle();
      spawnTimer = Math.max(14, 78 - diffT * 0.016);
    }
    orbTimer--;
    if (orbTimer <= 0) {
      spawnOrb();
      orbTimer = 90 + Math.random() * 60;
    }

    // obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      if (o.kind === 'meteor') {
        if (o.warnTimer > 0) { o.warnTimer--; continue; }  // 경고 중엔 정지·충돌 없음
        o.y += speed * 3;
      } else {
        o.y += o.vy;
      }
      if (o.kind === 'diamond') {
        o.x += o.vx;
        o.rot += o.rotSpd;
        if (o.x < 20 || o.x > W - 20) o.vx *= -1;
      } else if (o.kind === 'homing') {
        o.rot += o.rotSpd;
        o.vx += Math.sign(player.x - o.x) * 0.05;
        o.vx = Math.max(-2.2, Math.min(2.2, o.vx));
        o.x += o.vx;
      } else if (o.kind === 'zig') {
        o.rot += o.rotSpd;
        o.phase += 0.045;
        o.x = o.baseX + Math.sin(o.phase) * o.amp;
      }
      if (o.y > H + 60) { obstacles.splice(i, 1); continue; }

      if (invincible > 0) continue;   // 무적 중엔 충돌·그레이즈 없음
      const res = o.kind === 'bar' ? hitBar(o)
                : o.kind === 'meteor' ? hitMeteor(o)
                : hitDiamond(o);
      if (res.hit) {
        loseLife();
        if (!running) return;
        continue;
      }
      // graze bonus: 스칠 때 1회
      if (!o.grazed && res.graze && o.y > player.y - 40 && o.y < player.y + 40) {
        o.grazed = true;
        const bonus = 25 * combo;
        score += bonus;
        sfx.graze();
        floatText(player.x, player.y - 26, '+' + bonus, stage().color);
        burst(player.x, player.y, stage().color, 5);
      }
    }

    // orbs
    for (let i = orbs.length - 1; i >= 0; i--) {
      const o = orbs[i];
      o.y += o.vy;
      o.phase += 0.15;
      if (o.y > H + 30) { orbs.splice(i, 1); continue; }
      if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + player.r + 6) {
        orbs.splice(i, 1);
        combo = Math.min(combo + 1, 20);
        comboTimer = 300;
        const gain = 100 * combo;
        score += gain;
        const before = stage();
        orbsEaten++;
        sfx.orb(combo);
        if (stage() !== before) {
          sfx.evolve();
          floatText(player.x, player.y - 46, '⚡ EVOLVE!', stage().color);
          burst(player.x, player.y, stage().color, 24);
        }
        floatText(o.x, o.y, '+' + gain + ' x' + combo, '#ffe600');
        burst(o.x, o.y, '#ffe600', 16);
        shake = Math.min(shake + 3, 8);
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (!p.text) { p.vx *= 0.96; p.vy *= 0.96; }
      p.life -= p.text ? 0.02 : 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shake > 0) shake *= 0.85;

    hudScore.textContent = score.toLocaleString();
    hudCombo.textContent = 'x' + combo;
  }

  // ---- draw ----
  function drawDiamond(o) {
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rot);
    ctx.beginPath();
    ctx.moveTo(0, -o.size);
    ctx.lineTo(o.size * 0.7, 0);
    ctx.lineTo(0, o.size);
    ctx.lineTo(-o.size * 0.7, 0);
    ctx.closePath();
    ctx.strokeStyle = o.color || '#ff00e5';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = o.color || '#ff00e5';
    ctx.shadowBlur = 16;
    ctx.stroke();
    ctx.fillStyle = `rgba(${o.rgb || '255,0,229'},.12)`;
    ctx.fill();
    ctx.restore();
  }

  function drawMeteor(o) {
    ctx.save();
    if (o.warnTimer > 0) {
      // 낙하 지점 경고선 (깜빡임)
      const a = 0.18 + 0.18 * Math.sin(t * 0.5);
      ctx.fillStyle = `rgba(255,80,80,${a})`;
      ctx.fillRect(o.x - 2, 0, 4, H);
    } else {
      // 꼬리
      for (let j = 1; j <= 6; j++) {
        ctx.beginPath();
        ctx.arc(o.x, o.y - j * 14, o.r * (1 - j / 8), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,140,66,${0.35 * (1 - j / 7)})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fillStyle = '#ff8c42';
      ctx.shadowColor = '#ff8c42';
      ctx.shadowBlur = 18;
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBar(o) {
    ctx.save();
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff3355';
    const h = 10;
    ctx.fillRect(0, o.y - h / 2, o.gapX - o.gapW / 2, h);
    ctx.fillRect(o.gapX + o.gapW / 2, o.y - h / 2, W - (o.gapX + o.gapW / 2), h);
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0.5) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    // stars
    for (const s of stars) {
      ctx.globalAlpha = s.z * 0.9;
      ctx.fillStyle = '#8899ff';
      ctx.fillRect(s.x, s.y, s.z * 2.2, s.z * 2.2);
    }
    ctx.globalAlpha = 1;

    // orbs
    for (const o of orbs) {
      const pr = o.r + Math.sin(o.phase) * 2;
      ctx.beginPath();
      ctx.arc(o.x, o.y, pr, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe600';
      ctx.shadowColor = '#ffe600';
      ctx.shadowBlur = 18;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // obstacles
    for (const o of obstacles) {
      if (o.kind === 'bar') drawBar(o);
      else if (o.kind === 'meteor') drawMeteor(o);
      else drawDiamond(o);
    }

    // 웨이브/이벤트 배너
    if (running && banner && banner.timer > 0) {
      const bt = banner.timer;
      const a = bt > 90 ? (120 - bt) / 30 : Math.min(1, bt / 50);
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, a));
      ctx.font = '900 52px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#00f5ff';
      ctx.shadowColor = '#00f5ff';
      ctx.shadowBlur = 30;
      ctx.fillText(banner.text, W / 2, H * 0.32);
      ctx.restore();
    }

    // trail
    if (running) {
      const st = stage();
      // 무적 중 깜빡임: 8프레임 주기로 반투명
      const blink = invincible > 0 && (t % 8 < 4);
      ctx.globalAlpha = blink ? 0.25 : 1;
      for (let i = 0; i < trail.length; i++) {
        const a = 1 - i / trail.length;
        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, player.r * a * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${st.rgb},${a * 0.18 * (blink ? 0.25 : 1)})`;
        ctx.fill();
      }
      // player
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
      ctx.fillStyle = st.color;
      ctx.shadowColor = st.color;
      ctx.shadowBlur = 22;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(player.x - player.r * 0.3, player.y - player.r * 0.3, player.r * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(p.life, 0);
      if (p.text) {
        ctx.font = '700 16px "Segoe UI", sans-serif';
        ctx.fillStyle = p.color;
        ctx.textAlign = 'center';
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.fillText(p.text, p.x, p.y);
        ctx.shadowBlur = 0;
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
